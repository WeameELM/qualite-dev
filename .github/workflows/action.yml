name: CI
on:
  - pull_request
jobs:
  job1:
    runs-on: ubuntu-latest
    name: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and test
        working-directory: .
        run: |
          export SHELL=/bin/bash
          chmod u+x ./gradlew
          ./gradlew test --stacktrace || true
          ./gradlew jacocoTestReport || true